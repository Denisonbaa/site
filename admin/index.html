<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAA Denison — Content Manager</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.init({
        APIUrl: "https://denisonbaa.netlify.app/.netlify/identity"
      });
    }
  </script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    var PerspectivesPreview = createClass({
      render: function() {
        var entry = this.props.entry;
        var data = entry.get('data');
        var issue     = data.get('issue')      || '';
        var title     = data.get('essayTitle') || '';
        var subtitle  = data.get('subtitle')   || '';
        var volNum    = data.get('volNum')      || '';
        var prevLabel = data.get('prevLabel')   || '';
        var prevLink  = data.get('prevLink')    || '';
        var nextLabel = data.get('nextLabel')   || '';
        var nextLink  = data.get('nextLink')    || '';

        return h('div', { style: { fontFamily: 'Georgia, "Times New Roman", serif', maxWidth: '780px', margin: '0 auto', padding: '48px 32px', color: '#1a1a1a', lineHeight: '1.7' } },
          h('p', { style: { fontSize: '12px', letterSpacing: '0.1em', textTransform: 'uppercase', color: '#888', marginBottom: '20px' } }, issue),
          h('h1', { style: { fontSize: '2.2em', fontWeight: '700', lineHeight: '1.2', margin: '0 0 12px' } }, title),
          h('p', { style: { fontSize: '1.1em', color: '#555', fontStyle: 'italic', marginBottom: '8px' } }, subtitle),
          h('p', { style: { fontSize: '12px', color: '#999', marginBottom: '40px' } }, 'Vol. ' + volNum),
          h('hr', { style: { border: 'none', borderTop: '2px solid #222', marginBottom: '40px' } }),
          this.props.widgetFor('body'),
          (prevLabel || nextLabel) ? h('div', { style: { display: 'flex', justifyContent: 'space-between', marginTop: '60px', paddingTop: '24px', borderTop: '1px solid #ddd', fontSize: '14px' } },
            prevLabel ? h('a', { href: prevLink, style: { color: '#333' } }, '← ' + prevLabel) : h('span', {}),
            nextLabel ? h('a', { href: nextLink, style: { color: '#333' } }, nextLabel + ' →') : h('span', {})
          ) : null
        );
      }
    });

    CMS.registerPreviewTemplate('perspectives', PerspectivesPreview);
  </script>
</body>
</html>
